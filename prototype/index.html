<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskBoard</title>
  <style>
    :root {
      --bg:          #f0ecff;
      --hdr-bg:      #ffffff;
      --hdr-border:  #c4b5fd;
      --fbar-bg:     #faf8ff;
      --fbar-border: #e8e2ff;
      --col-bg:      #ffffff;
      --col-shadow:  #d8d0f5;
      --col-border:  #e8e2ff;
      --card-bg:     #faf9ff;
      --card-border: #ede9fe;
      --card-shadow: #ddd6fe;
      --input-bg:    #faf9ff;
      --modal-bg:    #ffffff;
      --text:        #3d3557;
      --text-sub:    #888;
      --text-muted:  #ccc;
      --badge-bg:    #f0ecff;
      --badge-fg:    #7c63d6;
      --sort-bg:     #f0ecff;
      --sort-fg:     #9d8ec8;
      --prog-bg:     #e8e2ff;
      --prog-fg:     #7c3aed;
      --add-fg:      #bbb;
      --add-hover-bg:#f0ecff;
      --add-hover-fg:#7c63d6;
      --overlay-bg:  rgba(30,20,60,.45);
    }
    [data-dark="1"] {
      --bg:          #13101f;
      --hdr-bg:      #1d1832;
      --hdr-border:  #3b2f6e;
      --fbar-bg:     #1d1832;
      --fbar-border: #2e2650;
      --col-bg:      #1d1832;
      --col-shadow:  #0a0814;
      --col-border:  #2e2650;
      --card-bg:     #26203d;
      --card-border: #3b3060;
      --card-shadow: #150f28;
      --input-bg:    #26203d;
      --modal-bg:    #1d1832;
      --text:        #e2dbff;
      --text-sub:    #8878b8;
      --text-muted:  #4a3f70;
      --badge-bg:    #2e2650;
      --badge-fg:    #a78bfa;
      --sort-bg:     #2e2650;
      --sort-fg:     #8878b8;
      --prog-bg:     #2e2650;
      --prog-fg:     #a78bfa;
      --add-fg:      #4a3f70;
      --add-hover-bg:#2e2650;
      --add-hover-fg:#a78bfa;
      --overlay-bg:  rgba(10,8,20,.65);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); transition: background .25s, color .25s; }

    /* ===== ヘッダー ===== */
    #site-header {
      background: var(--hdr-bg); border-bottom: 3px solid var(--hdr-border);
      padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 20;
      box-shadow: 0 2px 12px rgba(167,139,250,.12);
      transition: background .25s, border-color .25s;
    }
    .hdr-logo { width: 28px; height: 28px; flex-shrink: 0; background: linear-gradient(135deg,#a78bfa,#60a5fa); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: .9rem; box-shadow: 0 2px 0 #7c3aed; }
    .hdr-title { font-size: 1.15rem; font-weight: 800; background: linear-gradient(90deg,#7c3aed,#2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
    .hdr-spacer { flex: 1; }
    .hdr-progress { display: flex; align-items: center; gap: 7px; font-size: .75rem; font-weight: 700; color: var(--text-sub); white-space: nowrap; }
    .prog-bar-wrap { width: 90px; height: 7px; background: var(--prog-bg); border-radius: 99px; overflow: hidden; }
    .prog-bar-fill  { height: 100%; background: var(--prog-fg); border-radius: 99px; transition: width .4s; }

    .hdr-alerts { display: flex; gap: 5px; }
    .alert-badge { font-size: .72rem; font-weight: 700; padding: 3px 9px; border-radius: 99px; cursor: pointer; border: none; font-family: inherit; transition: filter .15s, transform .1s, box-shadow .1s; }
    .alert-badge:active { transform: translateY(2px); box-shadow: none !important; }
    .badge-overdue { background: #fee2e2; color: #b91c1c; box-shadow: 0 2px 0 #fca5a5; }
    .badge-today   { background: #fef3c7; color: #92400e; box-shadow: 0 2px 0 #fde68a; }
    .badge-overdue.active { background: #ef4444; color: #fff; }
    .badge-today.active   { background: #f59e0b; color: #fff; }

    .hdr-icon-btn { background: var(--badge-bg); border: none; color: var(--badge-fg); width: 32px; height: 32px; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .9rem; box-shadow: 0 2px 0 var(--card-shadow); transition: filter .15s, transform .1s, box-shadow .1s; }
    .hdr-icon-btn:hover { filter: brightness(1.08); }
    .hdr-icon-btn:active { transform: translateY(2px); box-shadow: none; }
    .hdr-icon-btn.active { background: #7c3aed; color: #fff; box-shadow: 0 2px 0 #5b21b6; }

    /* ===== フィルターバー ===== */
    #filter-bar { background: var(--fbar-bg); border-bottom: 1.5px solid var(--fbar-border); padding: 8px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; transition: background .25s; }
    .search-wrap { position: relative; flex-shrink: 0; }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: .85rem; pointer-events: none; }
    #searchInput { padding: 6px 10px 6px 28px; border: 2px solid var(--col-border); border-radius: 10px; font-size: .82rem; font-family: inherit; background: var(--input-bg); color: var(--text); outline: none; width: 170px; transition: border-color .15s, box-shadow .15s; }
    #searchInput:focus { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,.15); }
    #searchInput::placeholder { color: var(--text-muted); }

    /* すべてボタン */
    #filterAllBtn { font-size: .76rem; font-weight: 700; padding: 5px 12px; border: none; border-radius: 99px; cursor: pointer; font-family: inherit; background: var(--badge-fg); color: #fff; box-shadow: 0 3px 0 #5b21b6; transition: filter .15s, transform .1s, box-shadow .1s; white-space: nowrap; }
    #filterAllBtn:hover { filter: brightness(1.1); }
    #filterAllBtn:active { transform: translateY(3px); box-shadow: none; }

    .filter-sep { width: 1px; height: 20px; background: var(--col-border); }
    .filter-label-wrap { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .lf-chip { font-size: .7rem; font-weight: 700; padding: 3px 9px; border-radius: 99px; cursor: pointer; border: 2px solid transparent; transition: filter .12s, transform .1s, box-shadow .1s; box-shadow: 0 2px 0 rgba(0,0,0,.08); }
    .lf-chip:active { transform: translateY(2px); box-shadow: none; }
    .lf-chip.active { border-color: rgba(0,0,0,.25); filter: brightness(.82); }

    /* ===== ボード ===== */
    #board { display: flex; gap: 18px; padding: 24px 24px 60px; overflow-x: auto; align-items: flex-start; }

    /* ===== カラム ===== */
    .column { background: var(--col-bg); border-radius: 18px; width: 268px; min-width: 268px; box-shadow: 0 4px 0 var(--col-shadow), 0 6px 20px rgba(0,0,0,.07); border: 1.5px solid var(--col-border); display: flex; flex-direction: column; transition: box-shadow .2s, border-color .2s, background .25s, opacity .2s; }
    .column.col-dragging  { opacity: .3; }
    .column.col-insert-left  { border-left:  3px solid #7c3aed; }
    .column.col-insert-right { border-right: 3px solid #7c3aed; }
    .column.card-drag-over { box-shadow: 0 4px 0 #a78bfa, 0 6px 24px rgba(167,139,250,.3); border-color: #a78bfa; }

    .col-header { padding: 11px 11px 7px; border-bottom: 1.5px solid var(--col-border); }
    .col-title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
    .col-drag-handle { cursor: grab; color: var(--text-muted); font-size: .9rem; padding: 0 2px; user-select: none; flex-shrink: 0; transition: color .15s; }
    .col-drag-handle:hover { color: #a78bfa; }
    .col-color-bar { width: 5px; height: 19px; border-radius: 99px; flex-shrink: 0; }
    .col-title { font-weight: 800; font-size: .92rem; flex: 1; }
    .col-count { font-size: .68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; background: var(--badge-bg); color: var(--badge-fg); }
    .col-del-btn { background: none; border: none; cursor: pointer; font-size: .85rem; padding: 2px 4px; border-radius: 6px; color: var(--text-muted); transition: color .15s, background .15s; }
    .col-del-btn:hover { color: #ef4444 !important; background: #fee2e2 !important; }

    .sort-row { display: flex; gap: 4px; }
    .sort-btn { font-size: .66rem; font-weight: 700; padding: 3px 8px; border: none; border-radius: 99px; cursor: pointer; background: var(--sort-bg); color: var(--sort-fg); font-family: inherit; box-shadow: 0 2px 0 var(--card-shadow); transition: background .12s, color .12s, transform .1s, box-shadow .1s; }
    .sort-btn:active { transform: translateY(2px); box-shadow: none; }
    .sort-btn.active { background: #7c3aed; color: #fff; box-shadow: 0 2px 0 #5b21b6; }

    /* ===== カードリスト ===== */
    .card-list { padding: 8px 8px 2px; min-height: 46px; }
    .drop-line { height: 3px; background: #7c3aed; border-radius: 99px; margin: 2px 4px; pointer-events: none; }

    /* ===== カード ===== */
    .card { background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 11px; padding: 9px 11px; margin-bottom: 7px; cursor: pointer; box-shadow: 0 2px 0 var(--card-shadow); transition: transform .15s, box-shadow .15s, background .25s, border-color .25s, opacity .2s; user-select: none; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 5px 14px rgba(124,99,214,.18); border-color: #c4b5fd; }
    .card.card-dragging { opacity: .3; transform: rotate(1.5deg); }
    .card.archived-card { opacity: .5; }
    .card-top { display: flex; align-items: flex-start; gap: 6px; }
    .card-title { font-size: .87rem; font-weight: 600; flex: 1; line-height: 1.4; }
    .card-del-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: .8rem; padding: 1px 3px; border-radius: 4px; flex-shrink: 0; transition: color .15s, background .15s; }
    .card-del-btn:hover { color: #ef4444; background: #fee2e2; }
    .pri-badge { font-size: .63rem; font-weight: 800; padding: 2px 6px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .pri-高 { background: #fee2e2; color: #b91c1c; }
    .pri-中 { background: #fef3c7; color: #92400e; }
    .pri-低 { background: #d1fae5; color: #065f46; }
    .card-labels { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
    .card-label-chip { font-size: .62rem; font-weight: 700; padding: 2px 6px; border-radius: 99px; white-space: nowrap; }
    .card-meta { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .card-due { font-size: .68rem; color: var(--text-sub); }
    .card-due.overdue { color: #ef4444; font-weight: 700; }
    .card-note { font-size: .65rem; color: var(--text-muted); }
    .card-archived-tag { font-size: .65rem; color: var(--text-muted); }

    /* ===== カード追加ボタン ===== */
    .add-card-btn { display: flex; align-items: center; gap: 5px; width: calc(100% - 16px); margin: 0 8px 10px; padding: 8px 10px; background: none; color: var(--add-fg); font-size: .82rem; font-weight: 600; font-family: inherit; border: 1.5px dashed var(--col-border); border-radius: 9px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; }
    .add-card-btn:hover { background: var(--add-hover-bg); color: var(--add-hover-fg); border-color: #a78bfa; }

    /* ===== カラム追加 ===== */
    .add-col-wrap { align-self: flex-start; margin-top: 4px; }
    .add-col-btn { width: 48px; height: 48px; background: var(--col-bg); border: 2px dashed var(--col-border); border-radius: 15px; color: var(--badge-fg); font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 var(--col-shadow); transition: background .15s, border-color .15s, transform .1s, box-shadow .1s; }
    .add-col-btn:hover { background: var(--add-hover-bg); border-color: #a78bfa; }
    .add-col-btn:active { transform: translateY(4px); box-shadow: none; }
    .new-col-form { background: var(--col-bg); border-radius: 16px; width: 230px; min-width: 230px; padding: 13px 11px 11px; box-shadow: 0 4px 0 var(--col-shadow), 0 6px 20px rgba(0,0,0,.07); border: 1.5px solid #c4b5fd; }
    .new-col-input { width: 100%; padding: 8px 10px; margin-bottom: 8px; border: 2px solid #a78bfa; border-radius: 10px; font-size: .87rem; font-family: inherit; outline: none; background: var(--input-bg); color: var(--text); }
    .new-col-input::placeholder { color: var(--text-muted); }
    .inline-btns { display: flex; gap: 6px; }

    /* ===== 共通ボタン 3D ===== */
    .btn { border: none; border-radius: 10px; font-size: .84rem; font-weight: 700; font-family: inherit; padding: 8px 18px; cursor: pointer; transition: transform .1s, box-shadow .1s, filter .1s; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .btn:active { transform: translateY(4px) !important; box-shadow: none !important; }
    .btn-primary { background: linear-gradient(180deg,#a78bfa,#7c3aed); color:#fff; box-shadow:0 4px 0 #5b21b6; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-danger  { background: linear-gradient(180deg,#f87171,#dc2626); color:#fff; box-shadow:0 4px 0 #991b1b; }
    .btn-danger:hover  { filter: brightness(1.08); }
    .btn-ghost   { background: var(--badge-bg); color: var(--badge-fg); box-shadow:0 4px 0 var(--card-shadow); }
    .btn-ghost:hover   { filter: brightness(.95); }
    .btn-sm { font-size:.76rem; padding:5px 12px; border-radius:8px; }

    /* ===== オーバーレイ ===== */
    .overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); backdrop-filter: blur(3px); z-index: 100; justify-content: center; align-items: center; padding: 16px; }
    .overlay.open { display: flex; }

    /* ===== カードモーダル ===== */
    .modal { background: var(--modal-bg); border-radius: 20px; width: 480px; max-width: 100%; padding: 28px 28px 22px; box-shadow: 0 8px 0 #5b21b6, 0 16px 48px rgba(60,20,120,.3); position: relative; animation: popIn .2s cubic-bezier(.34,1.56,.64,1); transition: background .25s; max-height: 90vh; overflow-y: auto; }
    @keyframes popIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-x { position: absolute; top:13px; right:13px; background: var(--badge-bg); border: none; color: var(--badge-fg); font-size:.9rem; font-weight:700; width:28px; height:28px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .modal-x:hover { filter: brightness(.92); }
    .modal-heading { font-size:1.05rem; font-weight:800; color:#7c3aed; margin-bottom:18px; }

    .field { margin-bottom: 14px; }
    .field label { display:block; font-size:.73rem; font-weight:700; color:#a78bfa; margin-bottom:4px; letter-spacing:.04em; text-transform:uppercase; }
    .field input[type="text"], .field input[type="date"], .field textarea {
      width:100%; padding:9px 11px; border:2px solid var(--col-border); border-radius:10px;
      font-size:.88rem; font-family:inherit; color:var(--text); outline:none;
      background:var(--input-bg); transition:border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus { border-color:#a78bfa; box-shadow:0 0 0 3px rgba(167,139,250,.15); }
    .field textarea { resize:vertical; min-height:68px; }
    .field input.error { border-color:#f87171; }

    /* 優先度 3Dボタン */
    .pri-btn-group { display: flex; gap: 8px; }
    .pri-select-btn {
      flex: 1; padding: 9px 10px; border: none; border-radius: 10px;
      font-size: .85rem; font-weight: 800; font-family: inherit; cursor: pointer;
      background: var(--sort-bg); color: var(--sort-fg);
      box-shadow: 0 4px 0 var(--card-shadow);
      transition: transform .1s, box-shadow .1s, background .15s, color .15s;
    }
    .pri-select-btn:active { transform: translateY(4px); box-shadow: none !important; }
    .pri-select-btn.sel-低 { background: #d1fae5; color: #065f46; box-shadow: 0 4px 0 #6ee7b7; }
    .pri-select-btn.sel-中 { background: #fef3c7; color: #92400e; box-shadow: 0 4px 0 #fde68a; }
    .pri-select-btn.sel-高 { background: #fee2e2; color: #b91c1c; box-shadow: 0 4px 0 #fca5a5; }

    /* ラベル選択UI */
    .label-manage-wrap { display: flex; flex-direction: column; gap: 8px; }
    .existing-labels { display: flex; flex-wrap: wrap; gap: 5px; min-height: 20px; }
    .label-sel-chip { font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:99px; cursor:pointer; border:2px solid transparent; transition:filter .12s, border-color .12s, transform .1s; user-select:none; }
    .label-sel-chip:hover { filter: brightness(.9); }
    .label-sel-chip.selected { border-color: rgba(0,0,0,.3); filter: brightness(.82); }
    .label-add-row { display: flex; gap: 6px; align-items: center; }
    .label-add-input { flex: 1; padding: 6px 10px; border: 2px solid var(--col-border); border-radius: 8px; font-size: .82rem; font-family: inherit; background: var(--input-bg); color: var(--text); outline: none; transition: border-color .15s; }
    .label-add-input:focus { border-color: #a78bfa; }
    .label-add-input::placeholder { color: var(--text-muted); }
    .label-add-btn { background: var(--badge-bg); border: none; color: var(--badge-fg); font-size: .8rem; font-weight: 700; padding: 6px 10px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-family: inherit; box-shadow: 0 2px 0 var(--card-shadow); transition: filter .12s, transform .1s, box-shadow .1s; }
    .label-add-btn:hover { filter: brightness(.95); }
    .label-add-btn:active { transform: translateY(2px); box-shadow: none; }

    .modal-actions { display:flex; gap:7px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }
    .modal-actions .push-left { margin-right:auto; }

    /* ===== 削除確認ダイアログ ===== */
    .dialog { background:var(--modal-bg); border-radius:17px; width:330px; max-width:100%; padding:26px 24px 20px; box-shadow:0 8px 0 #991b1b, 0 16px 40px rgba(100,20,20,.25); text-align:center; animation:popIn .18s cubic-bezier(.34,1.56,.64,1); transition:background .25s; }
    .dialog-icon { font-size:2rem; margin-bottom:9px; }
    .dialog h3 { font-size:.98rem; font-weight:800; margin-bottom:7px; }
    .dialog p  { font-size:.83rem; color:var(--text-sub); line-height:1.6; margin-bottom:16px; }
    .dialog-btns { display:flex; gap:9px; justify-content:center; }

    /* ===== ショートカットヘルプ ===== */
    .shortcuts-box { background:var(--modal-bg); border-radius:17px; width:340px; max-width:100%; padding:24px 26px 20px; box-shadow:0 8px 0 #5b21b6, 0 16px 48px rgba(60,20,120,.3); transition:background .25s; animation:popIn .2s cubic-bezier(.34,1.56,.64,1); }
    .shortcuts-box h3 { font-size:1rem; font-weight:800; color:#7c3aed; margin-bottom:14px; }
    .shortcut-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; font-size:.84rem; color:var(--text-sub); }
    .kbd { background:var(--badge-bg); color:var(--badge-fg); border:1.5px solid var(--col-border); border-radius:6px; padding:2px 8px; font-size:.76rem; font-weight:700; font-family:monospace; white-space:nowrap; flex-shrink:0; }

    /* ===== カラムカラー ===== */
    .bar-todo   {background:#a78bfa} .title-todo   {color:#6d28d9}
    .bar-doing  {background:#60a5fa} .title-doing  {color:#1d4ed8}
    .bar-done   {background:#34d399} .title-done   {color:#059669}
    .bar-custom {background:#f9a8d4} .title-custom {color:#9d174d}
    [data-dark="1"] .title-todo   {color:#c4b5fd}
    [data-dark="1"] .title-doing  {color:#93c5fd}
    [data-dark="1"] .title-done   {color:#6ee7b7}
    [data-dark="1"] .title-custom {color:#fbcfe8}
  </style>
</head>
<body data-dark="0">

<header id="site-header">
  <div class="hdr-logo">📋</div>
  <span class="hdr-title">TaskBoard</span>
  <div class="hdr-spacer"></div>
  <div class="hdr-progress">
    <span id="progText">0/0件</span>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="hdr-alerts">
    <button class="alert-badge badge-overdue" id="badgeOverdue" style="display:none" title="期限切れのタスク。クリックでフィルター">🔴 0件</button>
    <button class="alert-badge badge-today"   id="badgeToday"   style="display:none" title="今日が期限のタスク。クリックでフィルター">🟡 0件</button>
  </div>
  <button class="hdr-icon-btn" id="archiveToggleBtn" title="アーカイブを表示/非表示">📦</button>
  <button class="hdr-icon-btn" id="darkToggleBtn"    title="ダークモード">🌙</button>
  <button class="hdr-icon-btn" id="shortcutHelpBtn"  title="キーボードショートカット">⌨️</button>
</header>

<div id="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="タスクを検索... (/)">
  </div>
  <button id="filterAllBtn">すべて</button>
  <div class="filter-sep" id="labelFilterSep" style="display:none"></div>
  <div class="filter-label-wrap" id="labelFilterWrap"></div>
</div>

<div id="board"></div>

<!-- カード作成/編集モーダル -->
<div class="overlay" id="cardOverlay">
  <div class="modal">
    <button class="modal-x" id="modalX">✕</button>
    <div class="modal-heading" id="modalHeading">タスクを追加</div>
    <div class="field">
      <label>タイトル *</label>
      <input type="text" id="fTitle" placeholder="タスク名を入力">
    </div>
    <div class="field">
      <label>説明</label>
      <textarea id="fDesc" placeholder="詳細メモ（任意）"></textarea>
    </div>
    <div class="field">
      <label>優先度</label>
      <div class="pri-btn-group">
        <button class="pri-select-btn" data-val="低">🟢 低</button>
        <button class="pri-select-btn" data-val="中">🟡 中</button>
        <button class="pri-select-btn" data-val="高">🔴 高</button>
      </div>
    </div>
    <div class="field">
      <label>期限</label>
      <input type="date" id="fDue">
    </div>
    <div class="field">
      <label>ラベル</label>
      <div class="label-manage-wrap">
        <div class="existing-labels" id="modalLabelList"></div>
        <div class="label-add-row">
          <input type="text" class="label-add-input" id="labelAddInput" placeholder="新しいラベルを入力して追加...">
          <button class="label-add-btn" id="labelAddBtn">＋ 追加</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm push-left" id="modalDelBtn" style="display:none">削除</button>
      <button class="btn btn-ghost  btn-sm"           id="modalDupBtn" style="display:none">複製</button>
      <button class="btn btn-ghost  btn-sm"           id="modalCancelBtn">キャンセル</button>
      <button class="btn btn-primary btn-sm"          id="modalSaveBtn">保存する</button>
    </div>
  </div>
</div>

<!-- 削除確認ダイアログ -->
<div class="overlay" id="delOverlay">
  <div class="dialog">
    <div class="dialog-icon">🗑️</div>
    <h3 id="delTitle">削除しますか？</h3>
    <p id="delMsg"></p>
    <div class="dialog-btns">
      <button class="btn btn-ghost  btn-sm" id="delCancelBtn">キャンセル</button>
      <button class="btn btn-danger btn-sm" id="delConfirmBtn">削除する</button>
    </div>
  </div>
</div>

<!-- ショートカットヘルプ -->
<div class="overlay" id="shortcutOverlay">
  <div class="shortcuts-box">
    <h3>⌨️ キーボードショートカット</h3>
    <div class="shortcut-row"><span class="kbd">N</span><span>新しいタスクを追加（Todoカラム）</span></div>
    <div class="shortcut-row"><span class="kbd">/</span><span>検索バーにフォーカス</span></div>
    <div class="shortcut-row"><span class="kbd">Esc</span><span>モーダル / ダイアログを閉じる</span></div>
    <div class="shortcut-row"><span class="kbd">?</span><span>このヘルプを表示</span></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn btn-ghost btn-sm" id="shortcutCloseBtn">閉じる</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// バージョンチェック
// ================================================================
const DATA_VERSION = '5';
if (localStorage.getItem('tb_version') !== DATA_VERSION) {
  ['tb_cols','tb_cards','tb_labels','tb_dark'].forEach(k => localStorage.removeItem(k));
  localStorage.setItem('tb_version', DATA_VERSION);
}

// ================================================================
// ラベルカラーパレット
// ================================================================
const LABEL_PALETTE = [
  {color:'#2563eb',bg:'#dbeafe'},{color:'#7c3aed',bg:'#ede9fe'},
  {color:'#dc2626',bg:'#fee2e2'},{color:'#d97706',bg:'#fef3c7'},
  {color:'#059669',bg:'#d1fae5'},{color:'#db2777',bg:'#fce7f3'},
  {color:'#0891b2',bg:'#cffafe'},{color:'#65a30d',bg:'#ecfccb'},
];

// ================================================================
// データ
// ================================================================
const DEFAULT_COLS = [
  {id:'c1',title:'Todo',  color:'todo',  sort:null},
  {id:'c2',title:'進行中',color:'doing', sort:null},
  {id:'c3',title:'完了',  color:'done',  sort:null},
];
const DEFAULT_CARDS = [
  {id:'k1',colId:'c1',title:'プロトタイプを作る',      desc:'HTML/CSS/JSで画面確認',pri:'高',due:'2026-05-11',labels:[],archived:false},
  {id:'k2',colId:'c1',title:'ワイヤーフレームを見直す',desc:'',                     pri:'中',due:'2026-05-20',labels:[],archived:false},
  {id:'k3',colId:'c2',title:'GitHubにpushする',        desc:'',                     pri:'低',due:'',          labels:[],archived:false},
  {id:'k4',colId:'c3',title:'要件定義書を作成する',    desc:'完成済み',             pri:'高',due:'2026-05-08',labels:[],archived:false},
];

function loadLS(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}

let columns    = loadLS('tb_cols')   || DEFAULT_COLS;
let cards      = loadLS('tb_cards')  || DEFAULT_CARDS;
let userLabels = loadLS('tb_labels') || [];
let darkMode   = loadLS('tb_dark')  === true;

let uid = 300;
let showArchived = false;
let filter  = {search:'', label:null, deadline:null};
let drag    = {type:null, id:null};
let editCardId = null;
let editColId  = null;
let delTarget  = null;
let modalPri   = '中';
let modalSelectedLabels = [];

// ================================================================
// 保存
// ================================================================
function saveLS(){
  localStorage.setItem('tb_cols',   JSON.stringify(columns));
  localStorage.setItem('tb_cards',  JSON.stringify(cards));
  localStorage.setItem('tb_labels', JSON.stringify(userLabels));
  localStorage.setItem('tb_dark',   JSON.stringify(darkMode));
}

// ================================================================
// ドラッグ共通
// ================================================================
function clearDropUI(){
  document.querySelectorAll('.drop-line').forEach(e=>e.remove());
  document.querySelectorAll('.col-insert-left,.col-insert-right,.card-drag-over')
    .forEach(e=>e.classList.remove('col-insert-left','col-insert-right','card-drag-over'));
}

// ================================================================
// ヘッダー更新
// ================================================================
function updateHeader(){
  const today   = new Date().toISOString().slice(0,10);
  const doneIds = columns.filter(c=>c.color==='done').map(c=>c.id);
  const done    = cards.filter(c=>doneIds.includes(c.colId)||c.archived).length;
  const total   = cards.length;
  const pct     = total>0?Math.round(done/total*100):0;
  document.getElementById('progText').textContent = `${done}/${total}件 完了`;
  document.getElementById('progFill').style.width = pct+'%';

  const active    = cards.filter(c=>!c.archived);
  const overdue   = active.filter(c=>c.due&&c.due<today).length;
  const todayCnt  = active.filter(c=>c.due===today).length;
  const bOver = document.getElementById('badgeOverdue');
  const bTod  = document.getElementById('badgeToday');
  bOver.textContent = `🔴 ${overdue}件`;
  bTod.textContent  = `🟡 ${todayCnt}件`;
  bOver.style.display = overdue >0||filter.deadline==='overdue'?'':'none';
  bTod.style.display  = todayCnt>0||filter.deadline==='today'  ?'':'none';
  bOver.classList.toggle('active', filter.deadline==='overdue');
  bTod.classList.toggle('active',  filter.deadline==='today');

  document.getElementById('archiveToggleBtn').classList.toggle('active', showArchived);
  document.getElementById('darkToggleBtn').textContent = darkMode?'☀️':'🌙';
  document.body.dataset.dark = darkMode?'1':'0';
}

// ================================================================
// フィルターバー
// ================================================================
function updateFilterBar(){
  const wrap = document.getElementById('labelFilterWrap');
  const sep  = document.getElementById('labelFilterSep');
  wrap.innerHTML = '';
  if(userLabels.length===0){sep.style.display='none';return;}
  sep.style.display='';
  userLabels.forEach(lbl=>{
    const chip = document.createElement('button');
    chip.className = 'lf-chip'+(filter.label===lbl.id?' active':'');
    chip.textContent = lbl.name;
    chip.style.background = lbl.bg;
    chip.style.color = lbl.color;
    chip.addEventListener('click',()=>{filter.label=filter.label===lbl.id?null:lbl.id;render();});
    wrap.appendChild(chip);
  });
}

// ================================================================
// フィルター判定
// ================================================================
function cardVisible(card){
  if(!showArchived&&card.archived) return false;
  const today=new Date().toISOString().slice(0,10);
  if(filter.search&&!card.title.toLowerCase().includes(filter.search.toLowerCase())) return false;
  if(filter.label&&!(card.labels||[]).includes(filter.label)) return false;
  if(filter.deadline==='overdue'&&!(card.due&&card.due<today)) return false;
  if(filter.deadline==='today'&&card.due!==today) return false;
  return true;
}

// ================================================================
// レンダリング
// ================================================================
function render(){
  saveLS(); updateHeader(); updateFilterBar();
  const board = document.getElementById('board');
  board.innerHTML='';
  const today = new Date().toISOString().slice(0,10);

  columns.forEach(col=>{
    const colCards     = getColCards(col.id);
    const visibleCount = colCards.filter(cardVisible).length;

    const el = document.createElement('div');
    el.className='column'; el.dataset.colId=col.id;

    el.addEventListener('dragover',e=>{
      if(drag.type==='card'){e.preventDefault();el.classList.add('card-drag-over');}
      else if(drag.type==='col'){
        e.preventDefault();clearDropUI();
        if(drag.id!==col.id){
          const mid=el.getBoundingClientRect().left+el.getBoundingClientRect().width/2;
          el.classList.add(e.clientX<mid?'col-insert-left':'col-insert-right');
        }
      }
    });
    el.addEventListener('dragleave',()=>el.classList.remove('card-drag-over','col-insert-left','col-insert-right'));
    el.addEventListener('drop',e=>{
      if(drag.type==='card'){e.preventDefault();el.classList.remove('card-drag-over');moveCardToCol(drag.id,col.id);clearDropUI();render();}
      else if(drag.type==='col'){e.preventDefault();if(drag.id!==col.id){const mid=el.getBoundingClientRect().left+el.getBoundingClientRect().width/2;moveCol(drag.id,col.id,e.clientX<mid);}clearDropUI();render();}
    });

    // ヘッダー
    const header=document.createElement('div');header.className='col-header';
    const titleRow=document.createElement('div');titleRow.className='col-title-row';
    const handle=document.createElement('span');handle.className='col-drag-handle';handle.textContent='⠿';handle.draggable=true;
    handle.addEventListener('dragstart',e=>{drag={type:'col',id:col.id};e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('col-dragging'),0);});
    handle.addEventListener('dragend',()=>{el.classList.remove('col-dragging');drag={type:null,id:null};clearDropUI();});
    const bar=document.createElement('div');bar.className=`col-color-bar bar-${col.color}`;
    const ttl=document.createElement('span');ttl.className=`col-title title-${col.color}`;ttl.textContent=col.title;
    const cnt=document.createElement('span');cnt.className='col-count';cnt.textContent=visibleCount;
    const dBtn=document.createElement('button');dBtn.className='col-del-btn';dBtn.textContent='×';dBtn.title='カラムを削除';
    dBtn.addEventListener('click',()=>openDelDialog('col',col.id));
    titleRow.append(handle,bar,ttl,cnt,dBtn);

    const sortRow=document.createElement('div');sortRow.className='sort-row';
    [['pri','優先度順'],['due','期限順']].forEach(([key,label])=>{
      const btn=document.createElement('button');
      btn.className='sort-btn'+(col.sort===key?' active':'');btn.textContent=label;
      btn.addEventListener('click',()=>{col.sort=col.sort===key?null:key;render();});
      sortRow.appendChild(btn);
    });
    header.append(titleRow,sortRow);
    el.appendChild(header);

    // カードリスト
    const list=document.createElement('div');list.className='card-list';
    list.addEventListener('dragover',e=>{if(drag.type==='card'){e.preventDefault();e.stopPropagation();}});
    list.addEventListener('drop',e=>{if(drag.type==='card'){e.preventDefault();e.stopPropagation();moveCardToCol(drag.id,col.id);clearDropUI();render();}});

    colCards.forEach(card=>{
      if(!cardVisible(card)) return;
      const isOverdue=card.due&&card.due<today;
      const cardEl=document.createElement('div');
      cardEl.className='card'+(card.archived?' archived-card':'');
      cardEl.dataset.id=card.id; cardEl.draggable=true;

      const labelsHtml=(card.labels||[]).map(lid=>{
        const l=userLabels.find(x=>x.id===lid);
        return l?`<span class="card-label-chip" style="background:${l.bg};color:${l.color}">${esc(l.name)}</span>`:'';
      }).join('');

      cardEl.innerHTML=`
        <div class="card-top">
          <span class="card-title">${esc(card.title)}</span>
          <span class="pri-badge pri-${card.pri}">${card.pri}</span>
          <button class="card-del-btn" title="削除">×</button>
        </div>
        ${labelsHtml?`<div class="card-labels">${labelsHtml}</div>`:''}
        <div class="card-meta">
          ${card.due?`<span class="card-due ${isOverdue?'overdue':''}">📅 ${card.due}${isOverdue?' 期限切れ':''}</span>`:''}
          ${card.desc?`<span class="card-note">📝</span>`:''}
          ${card.archived?`<span class="card-archived-tag">📦 アーカイブ済</span>`:''}
        </div>`;

      cardEl.addEventListener('dragstart',e=>{drag={type:'card',id:card.id};e.dataTransfer.effectAllowed='move';e.stopPropagation();setTimeout(()=>cardEl.classList.add('card-dragging'),0);});
      cardEl.addEventListener('dragend',()=>{cardEl.classList.remove('card-dragging');drag={type:null,id:null};clearDropUI();});
      cardEl.addEventListener('dragover',e=>{
        if(drag.type!=='card')return;
        e.preventDefault();e.stopPropagation();
        el.classList.remove('card-drag-over');clearDropUI();
        const mid=cardEl.getBoundingClientRect().top+cardEl.getBoundingClientRect().height/2;
        const line=document.createElement('div');line.className='drop-line';
        list.insertBefore(line,e.clientY<mid?cardEl:cardEl.nextSibling);
      });
      cardEl.addEventListener('drop',e=>{
        if(drag.type!=='card')return;
        e.preventDefault();e.stopPropagation();
        if(drag.id===card.id){clearDropUI();return;}
        const mid=cardEl.getBoundingClientRect().top+cardEl.getBoundingClientRect().height/2;
        insertCard(drag.id,card.id,col.id,e.clientY<mid);
        clearDropUI();render();
      });
      cardEl.addEventListener('click',e=>{if(e.target.classList.contains('card-del-btn'))return;openCardModal(card.id);});
      cardEl.querySelector('.card-del-btn').addEventListener('click',e=>{e.stopPropagation();openDelDialog('card',card.id);});

      list.appendChild(cardEl);
    });
    el.appendChild(list);

    const addBtn=document.createElement('button');addBtn.className='add-card-btn';addBtn.innerHTML='＋ タスクを追加';
    addBtn.addEventListener('click',()=>{editColId=col.id;openCardModal(null);});
    el.appendChild(addBtn);
    board.appendChild(el);
  });

  // カラム追加
  const wrap=document.createElement('div');wrap.className='add-col-wrap';
  const addColBtn=document.createElement('button');addColBtn.className='add-col-btn';addColBtn.textContent='＋';addColBtn.title='カラムを追加';
  const newColForm=document.createElement('div');newColForm.className='new-col-form';newColForm.style.display='none';
  const ncInput=document.createElement('input');ncInput.type='text';ncInput.className='new-col-input';ncInput.placeholder='カラム名を入力...';
  const ncBtns=document.createElement('div');ncBtns.className='inline-btns';
  const ncAdd=document.createElement('button');ncAdd.className='btn btn-primary btn-sm';ncAdd.textContent='追加';
  const ncCancel=document.createElement('button');ncCancel.className='btn btn-ghost btn-sm';ncCancel.textContent='キャンセル';
  const commitCol=()=>{const t=ncInput.value.trim();if(t){columns.push({id:'c'+uid++,title:t,color:'custom',sort:null});render();}else{newColForm.style.display='none';addColBtn.style.display='';}};
  ncInput.addEventListener('keydown',e=>{if(e.key==='Enter')commitCol();if(e.key==='Escape'){newColForm.style.display='none';addColBtn.style.display='';}});
  ncAdd.addEventListener('click',commitCol);
  ncCancel.addEventListener('click',()=>{newColForm.style.display='none';addColBtn.style.display='';});
  addColBtn.addEventListener('click',()=>{addColBtn.style.display='none';newColForm.style.display='block';ncInput.value='';ncInput.focus();});
  ncBtns.append(ncAdd,ncCancel);newColForm.append(ncInput,ncBtns);wrap.append(addColBtn,newColForm);
  board.appendChild(wrap);
}

// ================================================================
// 並び替え / 移動
// ================================================================
function getColCards(colId){
  const col=columns.find(c=>c.id===colId);
  let list=cards.filter(c=>c.colId===colId);
  if(col?.sort==='pri'){const o={'高':0,'中':1,'低':2};list=[...list].sort((a,b)=>o[a.pri]-o[b.pri]);}
  else if(col?.sort==='due'){list=[...list].sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return a.due.localeCompare(b.due);});}
  return list;
}
function moveCardToCol(fromId,toColId){const c=cards.find(c=>c.id===fromId);if(c)c.colId=toColId;}
function insertCard(fromId,targetId,targetColId,before){
  const fi=cards.findIndex(c=>c.id===fromId);
  const sameCol=cards[fi].colId===targetColId;
  const [moved]=cards.splice(fi,1);
  moved.colId=targetColId;
  const ti=cards.findIndex(c=>c.id===targetId);
  cards.splice(before?ti:ti+1,0,moved);
  // 同カラム内の手動並び替え時はソートを解除
  if(sameCol){const col=columns.find(c=>c.id===targetColId);if(col)col.sort=null;}
}
function moveCol(fromId,targetId,before){
  const fi=columns.findIndex(c=>c.id===fromId);const [moved]=columns.splice(fi,1);
  const ti=columns.findIndex(c=>c.id===targetId);columns.splice(before?ti:ti+1,0,moved);
}

// ================================================================
// 優先度ボタン UI
// ================================================================
function updatePriBtns(){
  document.querySelectorAll('.pri-select-btn').forEach(btn=>{
    const v=btn.dataset.val;
    btn.className='pri-select-btn'+(modalPri===v?` sel-${v}`:'');
  });
}
document.querySelectorAll('.pri-select-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{modalPri=btn.dataset.val;updatePriBtns();});
});

// ================================================================
// カードモーダル
// ================================================================
function buildLabelUI(){
  const listEl=document.getElementById('modalLabelList');listEl.innerHTML='';
  userLabels.forEach(lbl=>{
    const chip=document.createElement('div');
    chip.className='label-sel-chip'+(modalSelectedLabels.includes(lbl.id)?' selected':'');
    chip.textContent=lbl.name;chip.style.background=lbl.bg;chip.style.color=lbl.color;chip.dataset.id=lbl.id;
    chip.addEventListener('click',()=>{
      if(modalSelectedLabels.includes(lbl.id))modalSelectedLabels=modalSelectedLabels.filter(x=>x!==lbl.id);
      else modalSelectedLabels.push(lbl.id);
      buildLabelUI();
    });
    listEl.appendChild(chip);
  });
}

function openCardModal(cardId){
  editCardId=cardId;
  const isEdit=!!cardId;
  document.getElementById('modalHeading').textContent=isEdit?'タスクを編集':'タスクを追加';
  document.getElementById('modalDelBtn').style.display=isEdit?'inline-flex':'none';
  document.getElementById('modalDupBtn').style.display=isEdit?'inline-flex':'none';
  if(isEdit){
    const c=cards.find(c=>c.id===cardId);
    document.getElementById('fTitle').value=c.title;
    document.getElementById('fDesc').value=c.desc;
    document.getElementById('fDue').value=c.due;
    modalPri=c.pri;
    modalSelectedLabels=[...(c.labels||[])];
  } else {
    document.getElementById('fTitle').value='';
    document.getElementById('fDesc').value='';
    document.getElementById('fDue').value='';
    modalPri='中';
    modalSelectedLabels=[];
  }
  document.getElementById('labelAddInput').value='';
  updatePriBtns();buildLabelUI();
  document.getElementById('fTitle').classList.remove('error');
  document.getElementById('cardOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),50);
}

function closeCardModal(){document.getElementById('cardOverlay').classList.remove('open');}

function addNewLabel(){
  const name=document.getElementById('labelAddInput').value.trim();if(!name)return;
  const ex=userLabels.find(l=>l.name===name);
  if(ex){if(!modalSelectedLabels.includes(ex.id))modalSelectedLabels.push(ex.id);}
  else{const pal=LABEL_PALETTE[userLabels.length%LABEL_PALETTE.length];const nl={id:'l'+uid++,name,...pal};userLabels.push(nl);modalSelectedLabels.push(nl.id);}
  document.getElementById('labelAddInput').value='';buildLabelUI();
}

document.getElementById('labelAddBtn').addEventListener('click',addNewLabel);
document.getElementById('labelAddInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addNewLabel();}});
document.getElementById('modalX').addEventListener('click',closeCardModal);
document.getElementById('modalCancelBtn').addEventListener('click',closeCardModal);
document.getElementById('cardOverlay').addEventListener('click',e=>{if(e.target.id==='cardOverlay')closeCardModal();});

document.getElementById('modalSaveBtn').addEventListener('click',()=>{
  const title=document.getElementById('fTitle').value.trim();
  if(!title){document.getElementById('fTitle').classList.add('error');document.getElementById('fTitle').focus();return;}
  const desc=document.getElementById('fDesc').value.trim();
  const due=document.getElementById('fDue').value;
  const pri=modalPri;
  const labels=[...modalSelectedLabels];
  if(editCardId){Object.assign(cards.find(c=>c.id===editCardId),{title,desc,due,pri,labels});}
  else{cards.push({id:'k'+uid++,colId:editColId,title,desc,due,pri,labels,archived:false});}
  closeCardModal();render();
});

document.getElementById('modalDelBtn').addEventListener('click',()=>{closeCardModal();openDelDialog('card',editCardId);});
document.getElementById('modalDupBtn').addEventListener('click',()=>{
  const c=cards.find(c=>c.id===editCardId);
  cards.push({...c,id:'k'+uid++,title:c.title+' (コピー)',labels:[...c.labels],archived:false});
  closeCardModal();render();
});

// ================================================================
// 削除確認ダイアログ
// ================================================================
function openDelDialog(type,id){
  delTarget={type,id};
  if(type==='card'){const c=cards.find(c=>c.id===id);document.getElementById('delTitle').textContent='タスクを削除しますか？';document.getElementById('delMsg').innerHTML=`「<strong>${esc(c.title)}</strong>」を削除します。<br>この操作は取り消せません。`;}
  else{const col=columns.find(c=>c.id===id);const n=cards.filter(c=>c.colId===id).length;document.getElementById('delTitle').textContent='カラムを削除しますか？';document.getElementById('delMsg').innerHTML=`「<strong>${esc(col.title)}</strong>」を削除します。${n>0?`<br>中の<strong>${n}件のタスク</strong>もすべて削除されます。`:''}<br>この操作は取り消せません。`;}
  document.getElementById('delOverlay').classList.add('open');
}
function closeDelDialog(){document.getElementById('delOverlay').classList.remove('open');}
document.getElementById('delCancelBtn').addEventListener('click',closeDelDialog);
document.getElementById('delOverlay').addEventListener('click',e=>{if(e.target.id==='delOverlay')closeDelDialog();});
document.getElementById('delConfirmBtn').addEventListener('click',()=>{
  if(delTarget.type==='card')cards=cards.filter(c=>c.id!==delTarget.id);
  else{cards=cards.filter(c=>c.colId!==delTarget.id);columns=columns.filter(c=>c.id!==delTarget.id);}
  closeDelDialog();render();
});

// ================================================================
// ヘッダーボタン
// ================================================================
document.getElementById('darkToggleBtn').addEventListener('click',()=>{darkMode=!darkMode;render();});
document.getElementById('archiveToggleBtn').addEventListener('click',()=>{showArchived=!showArchived;render();});
document.getElementById('badgeOverdue').addEventListener('click',()=>{filter.deadline=filter.deadline==='overdue'?null:'overdue';render();});
document.getElementById('badgeToday').addEventListener('click',()=>{filter.deadline=filter.deadline==='today'?null:'today';render();});
document.getElementById('searchInput').addEventListener('input',e=>{filter.search=e.target.value;render();});

// すべてボタン
document.getElementById('filterAllBtn').addEventListener('click',()=>{
  filter={search:'',label:null,deadline:null};
  document.getElementById('searchInput').value='';
  render();
});

document.getElementById('shortcutHelpBtn').addEventListener('click',()=>document.getElementById('shortcutOverlay').classList.add('open'));
document.getElementById('shortcutCloseBtn').addEventListener('click',()=>document.getElementById('shortcutOverlay').classList.remove('open'));
document.getElementById('shortcutOverlay').addEventListener('click',e=>{if(e.target.id==='shortcutOverlay')document.getElementById('shortcutOverlay').classList.remove('open');});

// ================================================================
// キーボードショートカット
// ================================================================
document.addEventListener('keydown',e=>{
  const inInput=['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  const anyOpen=document.querySelector('.overlay.open');
  if(e.key==='Escape'){document.querySelectorAll('.overlay.open').forEach(el=>el.classList.remove('open'));return;}
  if(inInput||anyOpen)return;
  if(e.key==='n'||e.key==='N'){e.preventDefault();editColId=columns[0]?.id||null;openCardModal(null);}
  if(e.key==='/'){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key==='?')document.getElementById('shortcutOverlay').classList.add('open');
});

// ================================================================
// ユーティリティ & 起動
// ================================================================
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
render();
</script>
</body>
</html>
